<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran CKG Anak Sekolah</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            /* Background biru pastel murni */
            background-color: #e0f2fe; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
        }

        .container {
            background-color: #ffffff;
            padding: 2.5em;
            /* Sudut membulat yang lembut */
            border-radius: 16px;
            /* Bayangan halus agar form terlihat menonjol */
            box-shadow: 0 10px 25px rgba(2, 132, 199, 0.1);
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            /* Warna biru gelap untuk judul */
            color: #0369a1;
            margin-bottom: 1.5em;
            font-weight: 700;
            font-size: 1.6em;
        }

        .form-group {
            margin-bottom: 1.2em;
        }

        label {
            display: block;
            margin-bottom: 0.5em;
            color: #475569;
            font-weight: 600;
            font-size: 0.95em;
        }

        input[type="text"],
        input[type="date"],
        input[type="tel"],
        select {
            width: 100%;
            padding: 0.85em;
            border: 1.5px solid #cbd5e1;
            border-radius: 8px;
            box-sizing: border-box;
            background-color: #f8fafc;
            font-family: 'Nunito', sans-serif;
            font-size: 1em;
            color: #334155;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        /* Efek fokus saat orang tua mengetik */
        input:focus, select:focus {
            outline: none;
            border-color: #38bdf8;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
        }

        input[readonly] {
            background-color: #f1f5f9;
            color: #94a3b8;
            cursor: not-allowed;
        }

        button {
            width: 100%;
            padding: 0.9em;
            border: none;
            border-radius: 8px;
            /* Warna biru utama tombol */
            background-color: #0284c7;
            color: #ffffff;
            font-size: 1.1em;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            margin-top: 1em;
        }

        button:hover {
            background-color: #0369a1;
        }

        button:active {
            transform: scale(0.98);
        }

        .loading, .success-message {
            display: none;
            text-align: center;
            margin-top: 1.5em;
            font-weight: 600;
            padding: 0.8em;
            border-radius: 8px;
        }

        .loading {
            color: #475569;
            background-color: #f1f5f9;
        }

        .success-message {
            color: #166534;
            background-color: #dcfce7;
            border: 1px solid #bbf7d0;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Formulir Pendaftaran CKG Siswa</h2>
        <form name="submit-to-google-sheet">
            <div class="form-group">
                <label for="nik">NIK Siswa</label>
                <input type="text" id="nik" name="NIK SISWA" placeholder="Masukkan 16 digit NIK" required>
            </div>
            <div class="form-group">
                <label for="nama">Nama Lengkap Siswa</label>
                <input type="text" id="nama" name="NAMA SISWA" placeholder="Sesuai Akta Kelahiran / KK" required>
            </div>
            <div class="form-group">
                <label for="tanggal-lahir">Tanggal Lahir</label>
                <input type="date" id="tanggal-lahir" name="TANGGAL LAHIR" required>
            </div>
            <div class="form-group">
                <label for="umur">Umur</label>
                <input type="text" id="umur" name="UMUR" readonly placeholder="Akan terisi otomatis">
            </div>
            <div class="form-group">
                <label for="no-hp">Nomor HP / WhatsApp Wali Murid</label>
                <input type="tel" id="no-hp" name="NOMER HP" placeholder="Contoh: 08123456789" required>
            </div>
            <div class="form-group">
                <label for="kelas">Kelas</label>
                <select id="kelas" name="KELAS" required>
                    <option value="" disabled selected>Pilih Kelas Siswa</option>
                    <option value="1">Kelas 1</option>
                    <option value="2">Kelas 2</option>
                    <option value="3">Kelas 3</option>
                    <option value="4">Kelas 4</option>
                    <option value="5">Kelas 5</option>
                    <option value="6">Kelas 6</option>
                </select>
            </div>
            <div class="form-group">
                <label for="asal-sekolah">Asal Sekolah</label>
                <select id="asal-sekolah" name="ASAL SEKOLAH" required>
                    <option value="" disabled selected>Pilih Sekolah</option>
                    <option value="SDN Pagak 01">SDN Pagak 01</option>
                    <option value="SDN Pagak 03">SDN Pagak 03</option>
                    <option value="SDN Pagak 04">SDN Pagak 04</option>
                    <option value="SDN Pagak 05">SDN Pagak 05</option>
                    <option value="SDN Pagak 06">SDN Pagak 06</option>
                    <option value="SDN Gampingan 01">SDN Gampingan 01</option>
                    <option value="SDN Gampingan 02">SDN Gampingan 02</option>
                    <option value="SDN Gampingan 04">SDN Gampingan 04</option>
                    <option value="SDN Sumberejo 01">SDN Sumberejo 01</option>
                    <option value="SDN Sumberejo 02">SDN Sumberejo 02</option>
                    <option value="SDN Sumberejo 03">SDN Sumberejo 03</option>
                    <option value="SDN Tlogorejo 01">SDN Tlogorejo 01</option>
                    <option value="SDN Tlogorejo 02">SDN Tlogorejo 02</option>
                    <option value="SDN Tlogorejo 03">SDN Tlogorejo 03</option>
                    <option value="MI Mif. Ulum 01 Bekur">MI Mif. Ulum 01 Bekur</option>
                    <option value="MI Mif. Ulum 02 Druju">MI Mif. Ulum 02 Druju</option>
                    <option value="MI Nurul Ulum Pagak">MI Nurul Ulum Pagak</option>
                    <option value="MI Roud. Ulum Bendo">MI Roud. Ulum Bendo</option>
                    <option value="MI Sunan Giri Judeg">MI Sunan Giri Judeg</option>
                </select>
            </div>
            <button type="submit">Kirim Pendaftaran</button>
        </form>
        <div class="loading">Mohon tunggu, sedang memproses data...</div>
        <div class="success-message">Pendaftaran berhasil dikirim! ✅</div>
    </div>

    <script>
        // --- Skrip untuk Hitung Umur Otomatis ---
        const tanggalLahirInput = document.getElementById('tanggal-lahir');
        const umurInput = document.getElementById('umur');

        tanggalLahirInput.addEventListener('input', function() {
            const tanggalLahir = new Date(this.value);
            if (!isNaN(tanggalLahir.getTime())) {
                const today = new Date();
                let age = today.getFullYear() - tanggalLahir.getFullYear();
                const m = today.getMonth() - tanggalLahir.getMonth();
                if (m < 0 || (m === 0 && today.getDate() < tanggalLahir.getDate())) {
                    age--;
                }
                umurInput.value = age + " tahun";
            } else {
                umurInput.value = "";
            }
        });

        // --- Skrip untuk Kirim Data ke Google Sheet ---
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzAMngCJv75pZZ57PLHZjJL00NMtC8Ez_0KEzQys1Wen--PKjnA76Lu_ewGNJrTAbgJqQ/exec'; // <-- GANTI DENGAN URL APPS SCRIPT ANDA
        const form = document.forms['submit-to-google-sheet'];
        const loading = document.querySelector('.loading');
        const successMessage = document.querySelector('.success-message');

        form.addEventListener('submit', e => {
            e.preventDefault();
            loading.style.display = 'block';
            successMessage.style.display = 'none';

            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(response => {
                    loading.style.display = 'none';
                    successMessage.style.display = 'block';
                    form.reset();
                    umurInput.value = ""; 
                    setTimeout(() => {
                        successMessage.style.display = 'none';
                    }, 5000);
                })
                .catch(error => {
                    loading.style.display = 'none';
                    console.error('Error!', error.message);
                    alert('Terjadi kesalahan. Pastikan koneksi internet lancar dan coba lagi.');
                });
        });
    </script>

</body>
</html>
